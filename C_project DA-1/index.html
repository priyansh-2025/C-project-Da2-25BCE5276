<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Inventory Management System - WASM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:         #050c14;
        --surface:    #0a1628;
        --border:     #1a3a5c;
        --accent1:    #00e5ff;
        --accent2:    #ff6b2b;
        --accent3:    #a78bfa;
        --text:       #e2f0ff;
        --muted:      #4a6a8a;
        --green:      #00ffa3;
        --terminal-bg:#020810;
      }

      body {
        font-family: 'Syne', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 0 40px;
        overflow-x: hidden;
      }

      /* ── Noise overlay ── */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      /* ── Hero banner ── */
      .banner {
        width: 100%;
        padding: 48px 40px 36px;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        z-index: 1;
      }

      /* animated grid lines */
      .banner::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 48px 48px;
        opacity: 0.4;
        animation: gridDrift 20s linear infinite;
      }

      @keyframes gridDrift {
        from { background-position: 0 0; }
        to   { background-position: 48px 48px; }
      }

      /* glow orbs */
      .banner::after {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 80% at 20% 50%, rgba(0,229,255,.10) 0%, transparent 70%),
          radial-gradient(ellipse 50% 70% at 80% 40%, rgba(167,139,250,.08) 0%, transparent 70%),
          radial-gradient(ellipse 40% 60% at 50% 100%, rgba(255,107,43,.07) 0%, transparent 60%);
        pointer-events: none;
      }

      .badge {
        position: relative;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: var(--accent1);
        background: rgba(0,229,255,.08);
        border: 1px solid rgba(0,229,255,.22);
        padding: 5px 14px;
        border-radius: 100px;
        animation: fadeDown .6s ease both;
      }

      .badge .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 6px var(--green);
        animation: pulse 1.6s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,100% { opacity: 1; transform: scale(1); }
        50%      { opacity: .5; transform: scale(.7); }
      }

      h1 {
        position: relative;
        z-index: 2;
        font-size: clamp(2rem, 5vw, 3.4rem);
        font-weight: 800;
        letter-spacing: -.02em;
        line-height: 1.08;
        text-align: center;
        animation: fadeDown .7s .1s ease both;
      }

      h1 span.glow-cyan  { color: var(--accent1); text-shadow: 0 0 28px rgba(0,229,255,.55); }
      h1 span.glow-orange{ color: var(--accent2); text-shadow: 0 0 28px rgba(255,107,43,.45); }

      .subtitle {
        position: relative;
        z-index: 2;
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        color: var(--muted);
        letter-spacing: .04em;
        animation: fadeDown .7s .2s ease both;
      }

      @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* decorative separator */
      .sep {
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent1) 30%, var(--accent3) 70%, transparent);
        opacity: .35;
        position: relative;
        z-index: 1;
      }

      /* ── Main container ── */
      .container {
        width: 95%;
        max-width: 1100px;
        margin-top: 32px;
        position: relative;
        z-index: 1;
        animation: fadeUp .8s .3s ease both;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Stats bar ── */
      .stats-bar {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .stat-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 16px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: var(--muted);
        transition: border-color .25s;
      }

      .stat-pill:hover { border-color: var(--accent1); }

      .stat-pill .val {
        font-size: 15px;
        font-weight: 500;
        color: var(--text);
      }

      .stat-pill .indicator {
        width: 8px; height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .c-cyan   { background: var(--accent1); box-shadow: 0 0 6px var(--accent1); }
      .c-orange { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
      .c-purple { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }
      .c-green  { background: var(--green);   box-shadow: 0 0 6px var(--green); }

      /* ── Terminal panel ── */
      .terminal-wrapper {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        box-shadow:
          0 0 0 1px rgba(0,229,255,.04),
          0 32px 64px rgba(0,0,0,.6),
          inset 0 1px 0 rgba(255,255,255,.04);
      }

      /* window chrome */
      .terminal-chrome {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        background: rgba(255,255,255,.03);
        border-bottom: 1px solid var(--border);
      }

      .chrome-dot {
        width: 12px; height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .d-red    { background: #ff5f57; }
      .d-yellow { background: #febc2e; }
      .d-green  { background: #28c840; }

      .chrome-title {
        flex: 1;
        text-align: center;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: .06em;
        margin-right: 36px; /* compensate dots */
      }

      /* scan-line animation */
      #terminal-container {
        position: relative;
        background: var(--terminal-bg);
        overflow: hidden;
      }

      #terminal-container::after {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,229,255,.012) 2px,
          rgba(0,229,255,.012) 4px
        );
        pointer-events: none;
      }

      #output {
        width: 100%;
        height: 480px;
        background: transparent;
        color: var(--green);
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        line-height: 1.6;
        padding: 20px 24px;
        border: none;
        resize: vertical;
        outline: none;
        white-space: pre-wrap;
        overflow-y: auto;
        caret-color: var(--green);
        position: relative;
        z-index: 1;
      }

      #output::-webkit-scrollbar { width: 4px; }
      #output::-webkit-scrollbar-track { background: transparent; }
      #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

      #hidden-input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .cursor {
        display: inline-block;
        width: 8px; height: 18px;
        background: var(--green);
        animation: blink 1s step-end infinite;
        vertical-align: middle;
      }
      @keyframes blink { 50% { opacity: 0; } }

      /* ── Status bar ── */
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 14px;
        padding: 0 4px;
      }

      #status {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #status::before {
        content: '';
        display: inline-block;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 6px var(--green);
        animation: pulse 2s ease-in-out infinite;
      }

      .hint {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: var(--muted);
        opacity: .6;
      }
    </style>
  </head>
  <body>

    <!-- ── Hero banner ── -->
    <div class="banner">
      <span class="badge"><span class="dot"></span>WASM Runtime Active</span>
      <h1>
        <span class="glow-cyan">Inventory</span>
        <span class="glow-orange"> System</span>
        <br>Pro
      </h1>
      <p class="subtitle">// warehouse · stock · logistics · WASM-powered</p>
    </div>

    <div class="sep"></div>

    <!-- ── Main content ── -->
    <div class="container">

      <!-- stats pills -->
      <div class="stats-bar">
        <div class="stat-pill"><span class="indicator c-cyan"></span>Runtime <span class="val">WASM</span></div>
        <div class="stat-pill"><span class="indicator c-green"></span>Status <span class="val">Online</span></div>
        <div class="stat-pill"><span class="indicator c-orange"></span>Mode <span class="val">Interactive</span></div>
        <div class="stat-pill"><span class="indicator c-purple"></span>Engine <span class="val">Emscripten</span></div>
      </div>

      <!-- terminal -->
      <div class="terminal-wrapper">
        <div class="terminal-chrome">
          <span class="chrome-dot d-red"></span>
          <span class="chrome-dot d-yellow"></span>
          <span class="chrome-dot d-green"></span>
          <span class="chrome-title">inventory-system — bash</span>
        </div>

        <div id="terminal-container" onclick="document.getElementById('hidden-input').focus()">
          <div id="output"></div>
          <input type="text" id="hidden-input" autocomplete="off">
        </div>
      </div>

      <!-- status bar -->
      <div class="status-bar">
        <div id="status">System Ready · Click terminal to focus</div>
        <span class="hint">↵ Enter to submit · ⌫ Backspace to delete</span>
      </div>

    </div>

    <script type='text/javascript'>
      var outputElement = document.getElementById('output');
      var hiddenInput = document.getElementById('hidden-input');
      var statusElement = document.getElementById('status');

      var inputBuffer = "";
      var inputResolver = null;
      var isWaitingForInput = false;

      function appendToTerminal(text) {
        outputElement.innerText += text;
        outputElement.scrollTop = outputElement.scrollHeight;
      }

      hiddenInput.addEventListener('input', (e) => {
        if (!isWaitingForInput) return;
        const val = e.target.value;
        const char = val.slice(-1);
        if (val.length > inputBuffer.length) {
          appendToTerminal(char);
          inputBuffer = val;
        }
      });

      hiddenInput.addEventListener('keydown', (e) => {
        if (!isWaitingForInput) return;
        if (e.key === 'Enter') {
          appendToTerminal("\n");
          let result = inputBuffer;
          inputBuffer = "";
          hiddenInput.value = "";
          isWaitingForInput = false;
          if (inputResolver) inputResolver(result);
        } else if (e.key === 'Backspace') {
          if (inputBuffer.length > 0) {
            inputBuffer = inputBuffer.slice(0, -1);
            outputElement.innerText = outputElement.innerText.slice(0, -1);
          }
        }
      });

      var Module = {
        print: (text) => appendToTerminal(text + "\n"),
        printNoNewline: (text) => appendToTerminal(text),
        printErr: (text) => console.error(text),
        setStatus: (text) => { statusElement.innerText = text || 'System Ready · Click terminal to focus'; },
        waitForBrowserInput: function() {
          isWaitingForInput = true;
          hiddenInput.focus();
          return new Promise((resolve) => { inputResolver = resolve; });
        }
      };

      document.body.addEventListener('click', () => hiddenInput.focus());
    </script>
    <script async type="text/javascript" src="index.js"></script>
  </body>
</html>
